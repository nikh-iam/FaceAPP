name: BE-FaceAPP

on:
  push:
    branches: ["BE/dev"]
  pull_request:
    branches: ["BE/dev"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate faces_db structure
        run: |
          if [ ! -d "faces_db" ]; then
            echo "faces_db folder not found!"
            exit 1
          fi

          echo "Checking faces inside faces_db..."
          for dir in faces_db/*; do
            if [ -d "$dir" ]; then
              count=$(ls "$dir" | wc -l)
              if [ "$count" -eq 0 ]; then
                echo "No images found in $dir"
                exit 1
              fi
            fi
          done

      - name: Extract embeddings
        run: |
          python scripts/extract_embeddings.py

      - name: Run backend
        run: |
          python run.py
