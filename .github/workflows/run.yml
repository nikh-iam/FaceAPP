name: BE-FaceAPP

on:
  push:
    branches: ["BE/dev"]
  pull_request:
    branches: ["BE/dev"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Setup Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      # 3. Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. Ensure faces_db exists
      - name: Ensure faces_db exists
        run: |
          if [ ! -d "faces_db" ]; then
            echo "faces_db not found. Creating it..."
            mkdir -p faces_db
          fi

      # 5. Check if real images exist
      - name: Check for valid face data
        id: check_faces
        run: |
          has_images=false

          for dir in faces_db/*; do
            if [ -d "$dir" ]; then
              count=$(find "$dir" -type f \( -iname "*.jpg" -o -iname "*.png" \) | wc -l)
              if [ "$count" -gt 0 ]; then
                has_images=true
              fi
            fi
          done

          echo "has_images=$has_images" >> $GITHUB_OUTPUT

      # 6. Extract embeddings (only if images exist)
      - name: Extract embeddings
        if: steps.check_faces.outputs.has_images == 'true'
        run: |
          echo "Running embedding extraction..."
          python scripts/extract_embeddings.py

      - name: Skip embeddings
        if: steps.check_faces.outputs.has_images != 'true'
        run: |
          echo "No valid images found. Skipping embedding step."

      # 7. Run backend + health check
      - name: Run backend and test
        run: |
          echo "Starting backend..."
          python run.py &

          echo "Waiting for server to start..."
          sleep 5

          echo "Running health check..."
          curl -f http://127.0.0.1:8000 || (echo "Server failed" && exit 1)

          echo "Backend is running successfully!"
